# Gemini AI Code Review
#
# Wild ecosystem template — uses the shared wild-ecosystem GCP project.
# Requires these GitHub repo variables (set by /gemini-pr-review skill):
#   WIF_PROVIDER, WIF_SERVICE_ACCOUNT, GCP_PROJECT_ID,
#   GOOGLE_CLOUD_LOCATION, GOOGLE_GENAI_USE_VERTEXAI

name: Gemini Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write   # Required for WIF

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ github.event.pull_request.title }}
          ISSUE_BODY: ${{ github.event.pull_request.body }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          gcp_workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          gcp_service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
          gcp_location: ${{ vars.GOOGLE_CLOUD_LOCATION }}
          use_vertex_ai: ${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}
          gemini_model: gemini-2.5-pro
          prompt: /gemini-review
          settings: |
            {
              "tools": {
                "includeTools": [
                  "add_comment_to_pending_review",
                  "pull_request_read",
                  "pull_request_review_write"
                ],
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
